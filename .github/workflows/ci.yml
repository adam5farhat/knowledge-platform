name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate (API)
        run: npm run db:generate -w @knowledge-platform/api

      - name: Typecheck & compile API
        run: npm run build -w @knowledge-platform/api

      - name: Build web
        run: npm run build -w @knowledge-platform/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          PUBLIC_API_URL: http://localhost:3001
